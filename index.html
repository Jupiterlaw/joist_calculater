<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>龍骨佈局計算器</title>
  <style>
    :root {
      --bg: #f4f1ec;
      --surface: #ffffff;
      --surface-muted: #faf8f5;
      --border: #e2ddd4;
      --border-strong: #cfc7ba;
      --text: #2c2926;
      --text-muted: #6b6560;
      --accent: #2d5a4a;
      --accent-hover: #234839;
      --accent-soft: #e8f0ec;
      --danger: #9b3b32;
      --danger-soft: #fbeae8;
      --highlight: #c4a574;
      --shadow-sm: 0 2px 8px rgba(44, 41, 38, 0.06);
      --shadow: 0 4px 24px rgba(44, 41, 38, 0.08);
      --radius: 14px;
      --radius-sm: 10px;
      --font: "Segoe UI", "PingFang TC", "Microsoft JhengHei", "Noto Sans TC", sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1917;
        --surface: #242322;
        --surface-muted: #2a2928;
        --border: #3a3632;
        --border-strong: #4a4540;
        --text: #e8e4df;
        --text-muted: #9b9590;
        --accent: #4a8c73;
        --accent-hover: #3d7962;
        --accent-soft: rgba(74, 140, 115, 0.2);
        --danger: #c45b52;
        --danger-soft: rgba(196, 91, 82, 0.25);
        --highlight: #d4b88a;
        --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.25);
        --shadow: 0 4px 24px rgba(0, 0, 0, 0.35);
      }
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font);
      font-size: 16px;
      line-height: 1.55;
      color: var(--text);
      background: var(--bg);
    }

    .app {
      max-width: 1180px;
      margin: 0 auto;
      padding: 1.5rem 1.25rem 3rem;
    }

    .header { margin-bottom: 1.5rem; }
    .header h1 {
      margin: 0 0 0.4rem;
      font-size: clamp(1.5rem, 4vw, 2rem);
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    .header p {
      margin: 0;
      max-width: 40em;
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .app-grid {
      display: grid;
      grid-template-columns: minmax(320px, 400px) 1fr;
      gap: 1.25rem;
      align-items: start;
    }
    @media (max-width: 960px) {
      .app-grid { grid-template-columns: 1fr; }
      .app { padding: 1.25rem 1rem 2.5rem; }
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      padding: 1.35rem 1.5rem;
    }

    .card-title {
      margin: 0 0 1.1rem;
      font-size: 1.05rem;
      font-weight: 650;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .card-title::before {
      content: "";
      width: 4px;
      height: 1.1em;
      background: var(--accent);
      border-radius: 2px;
    }

    .formula {
      font-size: 0.85rem;
      color: var(--text-muted);
      background: var(--surface-muted);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0.6rem 0.75rem;
      margin-bottom: 1.1rem;
      line-height: 1.5;
      overflow-x: auto;
    }

    .field-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    @media (max-width: 480px) {
      .field-grid { grid-template-columns: 1fr; }
    }

    .field { display: flex; flex-direction: column; gap: 0.35rem; }
    .field label {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text);
    }
    .field .hint {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    input[type="number"] {
      width: 100%;
      min-height: 48px;
      padding: 0.6rem 0.75rem;
      font: inherit;
      font-size: 1rem;
      color: var(--text);
      background: var(--surface-muted);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }
    input:hover { border-color: var(--border-strong); }
    input:focus {
      outline: none;
      border-color: var(--accent);
      background: var(--surface);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }
    input:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    .btn-row {
      display: flex;
      gap: 0.75rem;
      margin-top: 1.25rem;
      flex-wrap: wrap;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.35rem;
      min-height: 48px;
      padding: 0.6rem 1.1rem;
      font: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      border-radius: var(--radius-sm);
      border: 1px solid transparent;
      cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease, transform 0.1s ease;
    }
    .btn:active { transform: scale(0.98); }
    .btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-secondary {
      background: var(--surface-muted);
      color: var(--text);
      border-color: var(--border);
    }
    .btn-secondary:hover { background: var(--surface); border-color: var(--border-strong); }
    .btn-secondary:disabled { opacity: 0.45; cursor: not-allowed; pointer-events: none; }
    @media (max-width: 480px) {
      .btn-row { flex-direction: column; }
      .btn { width: 100%; }
    }

    .pill-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 1.1rem;
    }
    .pill {
      font-size: 0.82rem;
      border-radius: 999px;
      padding: 0.35rem 0.7rem;
      border: 1px solid var(--border);
      background: var(--surface-muted);
      color: var(--text-muted);
    }
    .pill strong { color: var(--accent); font-weight: 700; }
    .pill.warn strong { color: var(--danger); }

    .error {
      color: var(--danger);
      font-size: 0.85rem;
      margin-top: 0.9rem;
      padding: 0.6rem 0.75rem;
      background: var(--danger-soft);
      border-radius: var(--radius-sm);
      border: 1px solid var(--danger-soft);
    }

    .table-wrap {
      margin-top: 0.5rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .table-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 0.75rem;
      padding: 0.75rem 1rem 0.6rem;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .table-header-meta { font-size: 0.82rem; color: var(--text-muted); }
    .table-scroll {
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      max-height: clamp(360px, 60vh, 560px);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
      min-width: 460px;
    }
    th, td {
      padding: 0.65rem 0.85rem;
      text-align: right;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }
    th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: var(--surface-muted);
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      font-size: 0.82rem;
    }
    th:first-child, td:first-child { text-align: left; }
    tbody tr:nth-child(even) { background: var(--surface-muted); }
    tr.highlight { background: var(--accent-soft) !important; }
    tr.highlight td { color: var(--accent); font-weight: 700; }
    tr.highlight td:first-child::before { content: "★ "; color: var(--accent); }

    .summary-footer {
      padding: 0.7rem 1rem 0.85rem;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.82rem;
      color: var(--text-muted);
      flex-wrap: wrap;
    }
    .summary-footer .key { color: var(--accent); font-weight: 700; }
    .summary-footer .value { color: var(--text); }

    .empty-state {
      font-size: 0.9rem;
      color: var(--text-muted);
      padding: 1.5rem 1rem;
      text-align: center;
    }

    .sr-only {
      position: absolute;
      width: 1px; height: 1px;
      padding: 0; margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      border: 0;
    }

    @media print {
      body { background: #fff; }
      .btn, .formula { display: none; }
      .card, .table-wrap { box-shadow: none; border: 1px solid #ccc; }
      th { background: #f0f0f0; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>龍骨佈局計算器</h1>
      <p>輸入場地與地板參數，自動計算每條龍骨的中心 / 左 / 右位置，並標示靠近板端接縫的龍骨。</p>
    </header>

    <main class="app-grid">
      <section class="card" aria-labelledby="input-heading">
        <h2 class="card-title" id="input-heading">參數</h2>
        <div class="formula" aria-hidden="true">
          中心(m,k) = (段長 × k + 邊緣偏移) + m × (地板長度 + 板間隙)
        </div>

        <div class="field-grid">
          <div class="field">
            <label for="lengthSite">場地長度（毫米）</label>
            <input type="number" id="lengthSite" value="9005" min="100" step="1" inputmode="numeric" aria-describedby="lengthSite-hint">
            <span class="hint" id="lengthSite-hint">施工範圍總長</span>
          </div>
          <div class="field">
            <label for="lengthBoard">地板長度（毫米）</label>
            <input type="number" id="lengthBoard" value="3000" min="100" step="1" inputmode="numeric" aria-describedby="lengthBoard-hint">
            <span class="hint" id="lengthBoard-hint">單片地板長</span>
          </div>
          <div class="field">
            <label for="widthJoist">龍骨闊度（毫米）</label>
            <input type="number" id="widthJoist" value="45" min="10" step="1" inputmode="numeric" aria-describedby="widthJoist-hint">
            <span class="hint" id="widthJoist-hint">單條龍骨寬</span>
          </div>
          <div class="field">
            <label for="maxSpacing">最大間距（毫米）</label>
            <input type="number" id="maxSpacing" value="400" min="100" step="10" inputmode="numeric" aria-describedby="maxSpacing-hint">
            <span class="hint" id="maxSpacing-hint">龍骨最大中心距</span>
          </div>
          <div class="field">
            <label for="edgeOffset">邊緣偏移（毫米）</label>
            <input type="number" id="edgeOffset" value="5" min="0" step="1" inputmode="numeric" aria-describedby="edgeOffset-hint">
            <span class="hint" id="edgeOffset-hint">首條龍骨距邊</span>
          </div>
          <div class="field">
            <label for="boardGap">板間隙（毫米）</label>
            <input type="number" id="boardGap" value="5" min="0" step="1" inputmode="numeric" aria-describedby="boardGap-hint">
            <span class="hint" id="boardGap-hint">板與板之間隙</span>
          </div>
        </div>

        <div class="btn-row">
          <button type="button" class="btn btn-secondary" onclick="copyCSV()" id="btnCopy" disabled>
            複製 CSV
          </button>
          <button type="button" class="btn btn-primary" onclick="calculate()">
            計算
          </button>
        </div>

        <div id="pillStats" class="pill-stats"></div>
        <div id="errorBox" class="error" style="display:none;" role="alert"></div>
      </section>

      <section class="card" aria-labelledby="result-heading">
        <h2 class="card-title" id="result-heading">龍骨位置</h2>
        <div class="table-wrap">
          <div class="table-header">
            <span class="table-header-meta" id="tableMeta">輸入參數後自動計算</span>
          </div>
          <div id="tableContainer" class="table-scroll">
            <div class="empty-state">請在左側輸入參數，結果會即時更新。</div>
          </div>
          <div class="summary-footer">
            <div>
              <span class="key">★</span>
              <span class="value"> 板端接縫</span><br>
              <span>靠近板端接縫的龍骨已標示</span>
            </div>
            <div id="footerInfo"></div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script>
    const MAX_BOARDS = 200;
    let lastRows = [];

    function $(id) { return document.getElementById(id); }

    function calculate() {
      const lengthSite  = parseFloat($("lengthSite").value);
      const lengthBoard = parseFloat($("lengthBoard").value);
      const widthJoist  = parseFloat($("widthJoist").value);
      const maxSpacing  = parseFloat($("maxSpacing").value);
      const edgeOffset  = parseFloat($("edgeOffset").value);
      const boardGap    = parseFloat($("boardGap").value);

      const errorBox    = $("errorBox");
      const pillStats   = $("pillStats");
      const tableMeta   = $("tableMeta");
      const tableContainer = $("tableContainer");
      const footerInfo  = $("footerInfo");
      const btnCopy     = $("btnCopy");

      errorBox.style.display = "none";
      errorBox.textContent = "";
      pillStats.innerHTML = "";
      footerInfo.textContent = "";
      btnCopy.disabled = true;
      lastRows = [];

      const inputs = [lengthSite, lengthBoard, widthJoist, maxSpacing, edgeOffset, boardGap];
      if (inputs.some(v => isNaN(v) || v < 0)) {
        showError("請輸入所有欄位的有效數值（≥ 0）。");
        tableContainer.innerHTML = "<div class='empty-state'>輸入不完整。</div>";
        tableMeta.textContent = "輸入無效";
        return;
      }

      if (lengthSite <= 0 || lengthBoard <= 0 || widthJoist <= 0 || maxSpacing <= 0) {
        showError("場地長度 / 地板長度 / 龍骨闊度 / 最大間距必須大於 0。");
        tableContainer.innerHTML = "<div class='empty-state'>參數必須為正數。</div>";
        tableMeta.textContent = "輸入無效";
        return;
      }

      if (widthJoist >= lengthBoard) {
        showError("龍骨闊度不能大於或等於地板長度。");
        tableContainer.innerHTML = "<div class='empty-state'>龍骨闊度異常。</div>";
        tableMeta.textContent = "參數異常";
        return;
      }

      const nSeg = Math.ceil(lengthBoard / maxSpacing);
      const segmentLength = lengthBoard / nSeg;
      const rows = [];

      let m = 0;
      while (m < MAX_BOARDS) {
        const blockOffset = m * (lengthBoard + boardGap);
        if (blockOffset > lengthSite + 1e-9) break;

        for (let k = 0; k < nSeg; k++) {
          const center = (segmentLength * k + edgeOffset) + blockOffset;
          const left   = center - widthJoist / 2;
          const right  = center + widthJoist / 2;

          if (left > lengthSite + 1e-9) break;

          const boardEnd = (m + 1) * lengthBoard + m * boardGap + boardGap;
          const isJoint = Math.abs(center - boardEnd) < segmentLength * 0.55;

          rows.push({
            boardIndex: m,
            segIndex: k,
            number: rows.length + 1,
            left: left.toFixed(2),
            center: center.toFixed(2),
            right: right.toFixed(2),
            isJoint,
          });
        }
        m++;
      }

      if (m >= MAX_BOARDS) {
        showError("超過最大板數量上限（" + MAX_BOARDS + "），請檢查參數。");
      }

      if (!rows.length) {
        tableContainer.innerHTML = "<div class='empty-state'>場地長度不足以放置任何龍骨。</div>";
        tableMeta.textContent = "無龍骨";
        return;
      }

      lastRows = rows;
      renderTable(rows);
      tableMeta.textContent = rows.length + " 條龍骨 · " + m + " 塊板";

      const spacingOk = segmentLength <= maxSpacing + 1e-9;
      const jointCount = rows.filter(r => r.isJoint).length;

      pillStats.innerHTML =
        '<div class="pill ' + (spacingOk ? "" : "warn") + '">' +
          '<span>段長</span> <strong>' + segmentLength.toFixed(1) + ' mm</strong> (n=' + nSeg + ')' +
        '</div>' +
        '<div class="pill">' +
          '<span>最大</span> <strong>' + maxSpacing.toFixed(0) + ' mm</strong>' +
        '</div>' +
        '<div class="pill">' +
          '<span>龍骨</span> <strong>' + rows.length + '</strong>' +
        '</div>' +
        '<div class="pill">' +
          '<span>板</span> <strong>' + m + '</strong>' +
        '</div>' +
        '<div class="pill">' +
          '<span>接縫 ★</span> <strong>' + jointCount + '</strong>' +
        '</div>';

      footerInfo.innerHTML =
        '<span class="key">段長</span> ' +
        '<span class="value">' + segmentLength.toFixed(2) + ' mm</span>';

      btnCopy.disabled = false;
    }

    function renderTable(rows) {
      const tbody = rows.map(function(r) {
        return '<tr class="' + (r.isJoint ? "highlight" : "") + '">' +
          '<td>' + r.number + '</td>' +
          '<td>' + r.boardIndex + '</td>' +
          '<td>' + r.segIndex + '</td>' +
          '<td>' + r.left + '</td>' +
          '<td>' + r.center + '</td>' +
          '<td>' + r.right + '</td>' +
        '</tr>';
      }).join("");

      $("tableContainer").innerHTML =
        '<table>' +
          '<thead><tr>' +
            '<th>龍骨 #</th>' +
            '<th>板 #</th>' +
            '<th>段 #</th>' +
            '<th>左（毫米）</th>' +
            '<th>中心（毫米）</th>' +
            '<th>右（毫米）</th>' +
          '</tr></thead>' +
          '<tbody>' + tbody + '</tbody>' +
        '</table>';
    }

    function showError(msg) {
      const box = $("errorBox");
      box.style.display = "block";
      box.textContent = msg;
    }

    function copyCSV() {
      if (!lastRows.length) return;
      const header = "龍骨 #,板 #,段 #,左（毫米）,中心（毫米）,右（毫米）,接縫";
      const lines = lastRows.map(function(r) {
        return [r.number, r.boardIndex, r.segIndex, r.left, r.center, r.right, r.isJoint ? "★" : ""].join(",");
      });
      const csv = header + "\n" + lines.join("\n");

      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(csv).then(function() {
          const btn = $("btnCopy");
          const orig = btn.innerHTML;
          btn.innerHTML = "已複製 ✓";
          setTimeout(function() { btn.innerHTML = orig; }, 1500);
        }).catch(function() {
          fallbackCopy(csv);
        });
      } else {
        fallbackCopy(csv);
      }
    }

    function fallbackCopy(text) {
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.style.position = "fixed";
      ta.style.left = "-9999px";
      ta.style.top = "-9999px";
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      try {
        document.execCommand("copy");
        const btn = $("btnCopy");
        btn.innerHTML = "已複製 ✓";
        setTimeout(function() { btn.innerHTML = "複製 CSV"; }, 1500);
      } catch (e) {
        alert("複製失敗，請手動選取複製。");
      }
      document.body.removeChild(ta);
    }

    // Live recompute on input (no button needed to see a result).
    ["lengthSite", "lengthBoard", "widthJoist", "maxSpacing", "edgeOffset", "boardGap"]
      .forEach(function(id) {
        $(id).addEventListener("input", calculate);
      });

    if (document.readyState !== "loading") calculate();
    else document.addEventListener("DOMContentLoaded", calculate);
  </script>
</body>
</html>
