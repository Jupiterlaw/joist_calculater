<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>Joist Layout Calculator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <style>
    /* ===== Design Tokens (UI-SYSTEM) ===== */
    :root {
      --bg:            #f4f1ec;
      --surface:       #ffffff;
      --surface-muted: #faf8f5;
      --border:        #e2ddd4;
      --border-strong: #cfc7ba;
      --text:          #2c2926;
      --text-muted:    #6b6560;
      --accent:        #2d5a4a;
      --accent-hover:  #234839;
      --accent-soft:   #e8f0ec;
      --danger:        #9b3b32;
      --danger-soft:   #fbeae8;
      --highlight:     #c4a574;
      --font: "Segoe UI", "PingFang TC", "Microsoft JhengHei", "Noto Sans TC", sans-serif;
      --radius: 14px;
      --radius-sm: 10px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:            #1a1917;
        --surface:       #242322;
        --surface-muted: #2a2928;
        --border:        #3a3632;
        --border-strong: #4a4540;
        --text:          #e8e4df;
        --text-muted:    #9b9590;
        --accent:        #4a8c73;
        --accent-hover:  #3d7962;
        --accent-soft:   rgba(74,140,115,0.2);
        --danger:        #c45b52;
        --danger-soft:   rgba(196,91,82,0.25);
        --highlight:     #d4b88a;
      }
    }

    /* ===== Reset & Base ===== */
    *, *::before, *::after { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }

    body {
      margin: 0;
      padding: 1.25rem;
      background: var(--bg);
      font-family: var(--font);
      color: var(--text);
      font-size: 16px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ===== Layout ===== */
    .app {
      max-width: 1080px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    /* ===== Card ===== */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 1.35rem 1.5rem;
      box-shadow: 0 1px 3px rgba(44,41,38,0.06);
    }

    .card-title {
      font-size: clamp(1.1rem, 3vw, 1.35rem);
      font-weight: 700;
      margin: 0 0 0.25rem;
      color: var(--text);
      letter-spacing: 0.02em;
    }

    .card-subtitle {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin: 0 0 1rem;
      line-height: 1.5;
    }

    /* ===== Fields ===== */
    .field-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    @media (max-width: 480px) {
      .field-grid { grid-template-columns: 1fr; }
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .field label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
    }

    .field label span {
      font-weight: 400;
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    .input {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--bg);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-sm);
      padding: 0.65rem 0.75rem;
      min-height: 44px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .input:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
      outline: none;
    }

    .input-prefix {
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 600;
      flex-shrink: 0;
      white-space: nowrap;
    }

    input[type="number"] {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      color: var(--text);
      font-size: 0.95rem;
      font-family: inherit;
      min-width: 0;
      padding: 0;
      -moz-appearance: textfield;
    }

    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    input[type="number"]::placeholder { color: var(--text-muted); opacity: 0.5; }

    /* ===== Buttons ===== */
    .btn-row {
      display: flex;
      gap: 0.75rem;
      margin-top: 1rem;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.65rem 1.25rem;
      font-size: 0.95rem;
      font-family: inherit;
      font-weight: 600;
      border-radius: var(--radius-sm);
      border: none;
      cursor: pointer;
      min-height: 44px;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      transition: background 0.15s, transform 0.1s;
    }

    .btn:active { transform: translateY(1px); }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:disabled {
      background: var(--border);
      color: var(--text-muted);
      cursor: not-allowed;
    }
    .btn-primary:disabled:active { transform: none; }

    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border-strong);
    }

    .btn-ghost:hover { background: var(--surface-muted); }
    .btn-ghost:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    @media (max-width: 480px) {
      .btn-row { flex-direction: column; }
      .btn-row .btn { flex: 1; justify-content: center; }
    }

    /* ===== Stats Pills ===== */
    .pill-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: 0.75rem;
    }

    .pill {
      font-size: 0.78rem;
      border-radius: 999px;
      padding: 0.3rem 0.65rem;
      border: 1px solid var(--border);
      background: var(--surface-muted);
      color: var(--text-muted);
      white-space: nowrap;
    }

    .pill strong { color: var(--accent); font-weight: 700; }
    .pill.ok strong { color: var(--accent); }
    .pill.warn strong { color: #b8860b; }

    /* ===== Error ===== */
    .error {
      color: var(--danger);
      font-size: 0.85rem;
      margin-top: 0.75rem;
      padding: 0.5rem 0.75rem;
      background: var(--danger-soft);
      border-radius: var(--radius-sm);
      border: 1px solid rgba(155,59,50,0.25);
    }

    /* ===== Results Card ===== */
    .table-wrap {
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      max-height: clamp(360px, 60vh, 540px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .table-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.6rem 0.85rem;
      border-bottom: 1px solid var(--border);
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .table-header-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text);
    }

    .table-header-meta {
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    .table-scroll {
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      flex: 1;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
      min-width: 480px;
      font-variant-numeric: tabular-nums;
    }

    th, td {
      padding: 0.5rem 0.65rem;
      text-align: right;
      white-space: nowrap;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: var(--surface-muted);
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      font-size: 0.78rem;
    }

    th:first-child, td:first-child { text-align: left; }

    tbody tr:nth-child(even) { background: var(--surface-muted); }
    tbody tr:nth-child(odd) { background: var(--surface); }

    tr.highlight { background: rgba(196,165,116,0.15) !important; }
    tr.highlight td { color: var(--text); font-weight: 600; }
    tr.highlight td:first-child::before { content: "★ "; color: var(--highlight); }

    .summary-footer {
      padding: 0.5rem 0.85rem;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.78rem;
      color: var(--text-muted);
      flex-wrap: wrap;
    }

    .summary-footer .key { color: var(--accent); font-weight: 600; }
    .summary-footer .value { color: var(--text); }
    .summary-footer .hint { font-size: 0.72rem; opacity: 0.7; }

    .empty-state {
      font-size: 0.85rem;
      color: var(--text-muted);
      padding: 1.25rem;
      text-align: center;
    }

    /* ===== Screen Reader Only ===== */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      border: 0;
    }

    /* ===== Print ===== */
    @media print {
      body { background: #fff; }
      .card { box-shadow: none; border: 1px solid #ccc; }
      .btn-row { display: none; }
    }
  </style>
</head>
<body>
  <div class="app">

    <!-- Input Panel -->
    <div class="card">
      <h1 class="card-title">Joist Layout Calculator</h1>
      <p class="card-subtitle">center(m,k) = (segmentLength × k + edgeOffset) + m × (boardLength + gap)</p>

      <div class="field-grid">
        <div class="field">
          <label for="lengthSite">Site length <span>(mm)</span></label>
          <div class="input">
            <span class="input-prefix">L</span>
            <input type="number" id="lengthSite" value="9005" min="100" step="1" inputmode="numeric" />
          </div>
        </div>

        <div class="field">
          <label for="lengthBoard">Board length <span>(mm)</span></label>
          <div class="input">
            <span class="input-prefix">B</span>
            <input type="number" id="lengthBoard" value="3000" min="100" step="1" inputmode="numeric" />
          </div>
        </div>

        <div class="field">
          <label for="widthJoist">Joist width <span>(mm)</span></label>
          <div class="input">
            <span class="input-prefix">W</span>
            <input type="number" id="widthJoist" value="45" min="10" step="1" inputmode="numeric" />
          </div>
        </div>

        <div class="field">
          <label for="maxSpacing">Max spacing <span>(mm)</span></label>
          <div class="input">
            <span class="input-prefix">≤</span>
            <input type="number" id="maxSpacing" value="400" min="100" step="10" inputmode="numeric" />
          </div>
        </div>

        <div class="field">
          <label for="edgeOffset">Edge offset <span>(mm)</span></label>
          <div class="input">
            <span class="input-prefix">↔</span>
            <input type="number" id="edgeOffset" value="5" min="0" step="1" inputmode="numeric" />
          </div>
        </div>

        <div class="field">
          <label for="boardGap">Board gap <span>(mm)</span></label>
          <div class="input">
            <span class="input-prefix">␣</span>
            <input type="number" id="boardGap" value="5" min="0" step="1" inputmode="numeric" />
          </div>
        </div>
      </div>

      <div class="btn-row">
        <button class="btn btn-ghost" onclick="copyCSV()" id="btnCopy" disabled>
          <span>📋 Copy CSV</span>
        </button>
        <button class="btn btn-primary" onclick="calculate()">
          <span>Calculate</span>
        </button>
      </div>

      <div id="pillStats" class="pill-stats"></div>
      <div id="errorBox" class="error" style="display:none;"></div>
    </div>

    <!-- Results Panel -->
    <div class="card">
      <div class="table-wrap">
        <div class="table-header">
          <div class="table-header-title">Joist Positions</div>
          <div class="table-header-meta" id="tableMeta">Press "Calculate" to generate</div>
        </div>
        <div id="tableContainer" class="table-scroll">
          <div class="empty-state">請喺左側輸入參數，撳「Calculate」生成龍骨佈局。</div>
        </div>
        <div class="summary-footer">
          <div>
            <span class="key">★</span>
            <span class="value"> Board Joint</span><br />
            <span class="hint">joists near board ends highlighted</span>
          </div>
          <div id="footerInfo"></div>
        </div>
      </div>
    </div>

  </div>

  <script>
    const MAX_BOARDS = 200;

    let lastRows = [];

    function $(id) { return document.getElementById(id); }

    function calculate() {
      const lengthSite  = parseFloat($("lengthSite").value);
      const lengthBoard = parseFloat($("lengthBoard").value);
      const widthJoist  = parseFloat($("widthJoist").value);
      const maxSpacing  = parseFloat($("maxSpacing").value);
      const edgeOffset  = parseFloat($("edgeOffset").value);
      const boardGap    = parseFloat($("boardGap").value);

      const errorBox    = $("errorBox");
      const pillStats   = $("pillStats");
      const tableMeta   = $("tableMeta");
      const tableContainer = $("tableContainer");
      const footerInfo  = $("footerInfo");
      const btnCopy     = $("btnCopy");

      errorBox.style.display = "none";
      errorBox.textContent = "";
      pillStats.innerHTML = "";
      footerInfo.textContent = "";
      btnCopy.disabled = true;
      lastRows = [];

      const inputs = [lengthSite, lengthBoard, widthJoist, maxSpacing, edgeOffset, boardGap];
      if (inputs.some(v => isNaN(v) || v < 0)) {
        showError("請輸入所有欄位嘅有效數值（≥ 0）。");
        tableContainer.innerHTML = "<div class='empty-state'>輸入不完整。</div>";
        tableMeta.textContent = "Invalid input";
        return;
      }

      if (lengthSite <= 0 || lengthBoard <= 0 || widthJoist <= 0 || maxSpacing <= 0) {
        showError("L / B / W / Max spacing 必須大於 0。");
        tableContainer.innerHTML = "<div class='empty-state'>參數必須為正數。</div>";
        tableMeta.textContent = "Invalid input";
        return;
      }

      if (widthJoist >= lengthBoard) {
        showError("Joist width 不能大於或等於 floorboard length。");
        tableContainer.innerHTML = "<div class='empty-state'>龍骨闊度異常。</div>";
        tableMeta.textContent = "Invalid config";
        return;
      }

      const nSeg = Math.ceil(lengthBoard / maxSpacing);
      const segmentLength = lengthBoard / nSeg;
      const rows = [];

      let m = 0;
      while (m < MAX_BOARDS) {
        const blockOffset = m * (lengthBoard + boardGap);
        if (blockOffset > lengthSite + 1e-9) break;

        for (let k = 0; k < nSeg; k++) {
          const center = (segmentLength * k + edgeOffset) + blockOffset;
          const left   = center - widthJoist / 2;
          const right  = center + widthJoist / 2;

          if (left > lengthSite + 1e-9) break;

          const boardEnd = (m + 1) * lengthBoard + m * boardGap + boardGap;
          const isJoint = Math.abs(center - boardEnd) < segmentLength * 0.55;

          rows.push({
            boardIndex: m,
            segIndex: k,
            number: rows.length + 1,
            left: left.toFixed(2),
            center: center.toFixed(2),
            right: right.toFixed(2),
            isJoint,
          });
        }
        m++;
      }

      if (m >= MAX_BOARDS) {
        showError("超過最大 board 數量上限（" + MAX_BOARDS + "），請檢查參數。");
      }

      if (!rows.length) {
        tableContainer.innerHTML = "<div class='empty-state'>場地長度不足以放置任何龍骨。</div>";
        tableMeta.textContent = "No joists";
        return;
      }

      lastRows = rows;
      renderTable(rows);
      tableMeta.textContent = rows.length + " joists · " + m + " boards";

      const spacingOk = segmentLength <= maxSpacing + 1e-9;
      const jointCount = rows.filter(r => r.isJoint).length;

      pillStats.innerHTML =
        '<div class="pill ' + (spacingOk ? "ok" : "warn") + '">' +
          '<span>Segment</span> <strong>' + segmentLength.toFixed(1) + ' mm</strong> (n=' + nSeg + ')' +
        '</div>' +
        '<div class="pill">' +
          '<span>Max</span> <strong>' + maxSpacing.toFixed(0) + ' mm</strong>' +
        '</div>' +
        '<div class="pill">' +
          '<span>Joists</span> <strong>' + rows.length + '</strong>' +
        '</div>' +
        '<div class="pill">' +
          '<span>Boards</span> <strong>' + m + '</strong>' +
        '</div>' +
        '<div class="pill">' +
          '<span>Joints ★</span> <strong>' + jointCount + '</strong>' +
        '</div>';

      footerInfo.innerHTML =
        '<span class="key">Segment</span> ' +
        '<span class="value">' + segmentLength.toFixed(2) + ' mm</span>';

      btnCopy.disabled = false;
    }

    function renderTable(rows) {
      const tbody = rows.map(function(r) {
        return '<tr class="' + (r.isJoint ? "highlight" : "") + '">' +
          '<td>' + r.number + '</td>' +
          '<td>' + r.boardIndex + '</td>' +
          '<td>' + r.segIndex + '</td>' +
          '<td>' + r.left + '</td>' +
          '<td>' + r.center + '</td>' +
          '<td>' + r.right + '</td>' +
        '</tr>';
      }).join("");

      $("tableContainer").innerHTML =
        '<table>' +
          '<thead><tr>' +
            '<th>Joist #</th>' +
            '<th>Board #</th>' +
            '<th>Seg #</th>' +
            '<th>Left (mm)</th>' +
            '<th>Center (mm)</th>' +
            '<th>Right (mm)</th>' +
          '</tr></thead>' +
          '<tbody>' + tbody + '</tbody>' +
        '</table>';
    }

    function showError(msg) {
      const box = $("errorBox");
      box.style.display = "block";
      box.textContent = msg;
    }

    function copyCSV() {
      if (!lastRows.length) return;
      const header = "Joist #,Board #,Seg #,Left (mm),Center (mm),Right (mm),Joint";
      const lines = lastRows.map(function(r) {
        return [r.number, r.boardIndex, r.segIndex, r.left, r.center, r.right, r.isJoint ? "★" : ""].join(",");
      });
      const csv = header + "\n" + lines.join("\n");

      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(csv).then(function() {
          const btn = $("btnCopy");
          const orig = btn.innerHTML;
          btn.innerHTML = "<span>✅ Copied!</span>";
          setTimeout(function() { btn.innerHTML = orig; }, 1500);
        }).catch(function() {
          fallbackCopy(csv);
        });
      } else {
        fallbackCopy(csv);
      }
    }

    function fallbackCopy(text) {
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.style.position = "fixed";
      ta.style.left = "-9999px";
      ta.style.top = "-9999px";
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      try {
        document.execCommand("copy");
        const btn = $("btnCopy");
        btn.innerHTML = "<span>✅ Copied!</span>";
        setTimeout(function() { btn.innerHTML = "<span>📋 Copy CSV</span>"; }, 1500);
      } catch (e) {
        alert("Copy failed. Please select and copy manually.");
      }
      document.body.removeChild(ta);
    }

    window.addEventListener("DOMContentLoaded", calculate);
  </script>
</body>
</html>
