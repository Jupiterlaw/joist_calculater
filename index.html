<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <title>Joist Layout Calculator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <style>
    :root {
      --bg: #0f172a;
      --primary: #38bdf8;
      --primary-soft: rgba(56,189,248,0.15);
      --accent: #fbbf24;
      --text-main: #e5e7eb;
      --text-muted: #9ca3af;
      --border: #1f2937;
      --danger: #f97373;
      --success: #4ade80;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      padding: clamp(12px, 3vw, 24px);
      background: radial-gradient(circle at top, #1f2937, #020617);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text-main);
      -webkit-text-size-adjust: 100%;
    }

    .app-shell {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(0, 340px) minmax(0, 1fr);
      gap: clamp(12px, 2vw, 20px);
    }

    @media (max-width: 860px) {
      .app-shell { grid-template-columns: 1fr; }
    }

    .panel {
      background: linear-gradient(135deg, #020617, #020617 40%, #020617 60%, #020617);
      border-radius: clamp(12px, 2vw, 16px);
      border: 1px solid rgba(148,163,184,0.3);
      box-shadow: 0 18px 45px rgba(15,23,42,0.9), 0 0 0 1px rgba(15,23,42,0.9);
      padding: clamp(14px, 2.5vw, 20px);
      position: relative;
      overflow: hidden;
    }

    .panel::before {
      content: "";
      position: absolute;
      inset: -120px;
      background:
        radial-gradient(circle at 0 0, rgba(56,189,248,0.08), transparent 60%),
        radial-gradient(circle at 100% 0, rgba(236,72,153,0.06), transparent 60%);
      opacity: 0.75;
      pointer-events: none;
    }

    .panel-header {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .panel-header h1 {
      margin: 0;
      font-size: clamp(0.9rem, 2.5vw, 1.05rem);
      letter-spacing: 0.03em;
      text-transform: uppercase;
      color: #e5e7eb;
    }

    .badge {
      font-size: clamp(0.65rem, 1.5vw, 0.7rem);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(56,189,248,0.15);
      color: var(--primary);
      border: 1px solid rgba(56,189,248,0.6);
      white-space: nowrap;
    }

    .subtext {
      position: relative;
      font-size: clamp(0.7rem, 1.8vw, 0.8rem);
      color: var(--text-muted);
      margin-bottom: 14px;
      line-height: 1.5;
      word-break: break-all;
    }

    .grid-2 {
      position: relative;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: clamp(8px, 1.5vw, 14px);
      margin-top: 4px;
    }

    @media (max-width: 480px) {
      .grid-2 { grid-template-columns: 1fr; }
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    label {
      font-size: clamp(0.7rem, 1.6vw, 0.78rem);
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    label span {
      color: var(--primary);
      font-size: 0.7rem;
      margin-left: 4px;
    }

    .input-wrapper {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #020617;
      border-radius: 999px;
      padding: clamp(6px, 1.2vw, 10px) clamp(10px, 2vw, 14px);
      border: 1px solid rgba(51,65,85,0.9);
      min-height: 44px;
    }

    .input-wrapper:focus-within {
      border-color: var(--primary);
      box-shadow: 0 0 0 1px rgba(56,189,248,0.4);
    }

    .input-prefix {
      font-size: clamp(0.75rem, 1.6vw, 0.8rem);
      color: var(--text-muted);
      white-space: nowrap;
      flex-shrink: 0;
    }

    input[type="number"] {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      color: var(--text-main);
      font-size: clamp(0.85rem, 2vw, 0.95rem);
      padding: 4px 0;
      min-width: 0;
      font-family: inherit;
    }

    input[type="number"]::placeholder { color: #4b5563; }

    .btn-row {
      position: relative;
      margin-top: 16px;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn-primary,
    .btn-secondary {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: clamp(10px, 1.8vw, 12px) clamp(16px, 3vw, 20px);
      font-size: clamp(0.8rem, 1.8vw, 0.85rem);
      border-radius: 999px;
      border: none;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-family: inherit;
      min-height: 44px;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .btn-primary {
      color: #0f172a;
      background: linear-gradient(135deg, #38bdf8, #22c55e);
      box-shadow: 0 12px 24px rgba(34,197,94,0.35), 0 0 0 1px rgba(15,23,42,0.8);
    }

    .btn-secondary {
      color: var(--text-main);
      background: rgba(51,65,85,0.6);
      border: 1px solid rgba(148,163,184,0.3);
    }

    .btn-primary:hover,
    .btn-secondary:hover {
      filter: brightness(1.05);
      transform: translateY(-0.5px);
    }

    .btn-primary:active,
    .btn-secondary:active {
      transform: translateY(0);
      box-shadow: 0 8px 18px rgba(34,197,94,0.25), 0 0 0 1px rgba(15,23,42,0.8);
    }

    .pill-stats {
      position: relative;
      display: flex;
      flex-wrap: wrap;
      gap: clamp(4px, 0.8vw, 6px);
      margin-top: 12px;
    }

    .pill {
      font-size: clamp(0.68rem, 1.5vw, 0.75rem);
      border-radius: 999px;
      padding: 5px 10px;
      border: 1px solid rgba(148,163,184,0.4);
      background: rgba(15,23,42,0.95);
      color: var(--text-muted);
      white-space: nowrap;
    }

    .pill strong { color: var(--primary); font-weight: 600; }
    .pill.ok strong { color: var(--success); }
    .pill.warn strong { color: var(--accent); }

    .panel-results { background: rgba(15,23,42,0.9); }

    .table-wrap {
      position: relative;
      margin-top: 6px;
      border-radius: 12px;
      border: 1px solid rgba(31,41,55,0.9);
      background: radial-gradient(circle at top, rgba(15,23,42,0.9), #020617);
      max-height: clamp(360px, 60vh, 540px);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .table-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 8px 12px 6px;
      border-bottom: 1px solid rgba(31,41,55,0.9);
      gap: 8px;
      flex-wrap: wrap;
    }

    .table-header-title {
      font-size: clamp(0.72rem, 1.6vw, 0.8rem);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-muted);
    }

    .table-header-meta {
      font-size: clamp(0.65rem, 1.4vw, 0.72rem);
      color: var(--text-muted);
    }

    .table-scroll {
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      flex: 1;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: clamp(0.7rem, 1.6vw, 0.8rem);
      min-width: 480px;
    }

    th, td {
      padding: clamp(6px, 1vw, 8px) clamp(8px, 1.5vw, 10px);
      text-align: right;
      white-space: nowrap;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #020617;
      color: var(--text-muted);
      border-bottom: 1px solid rgba(31,41,55,0.9);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: clamp(0.65rem, 1.4vw, 0.72rem);
    }

    th:first-child, td:first-child { text-align: left; }

    tbody tr:nth-child(even) { background: rgba(15,23,42,0.9); }
    tbody tr:nth-child(odd) { background: rgba(2,6,23,0.95); }

    tr.highlight { background: rgba(251,191,36,0.12) !important; }
    tr.highlight td { color: #e5e7eb; font-weight: 500; }
    tr.highlight td:first-child::before { content: "★ "; color: var(--accent); }

    .summary-footer {
      padding: 8px 12px 10px;
      border-top: 1px solid rgba(31,41,55,0.9);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      font-size: clamp(0.68rem, 1.4vw, 0.75rem);
      color: var(--text-muted);
      flex-wrap: wrap;
    }

    .summary-footer span.key { color: var(--primary); }
    .summary-footer span.value { color: #e5e7eb; }
    .summary-footer .hint { font-size: 0.7rem; opacity: 0.8; }

    .empty-state {
      font-size: clamp(0.75rem, 1.6vw, 0.82rem);
      color: var(--text-muted);
      padding: clamp(12px, 2vw, 20px);
      text-align: center;
    }

    .error {
      color: var(--danger);
      font-size: clamp(0.72rem, 1.5vw, 0.8rem);
      margin-top: 8px;
      padding: 8px 12px;
      background: rgba(249,115,115,0.08);
      border-radius: 8px;
      border: 1px solid rgba(249,115,115,0.3);
    }

    @media (max-width: 480px) {
      .btn-row { justify-content: stretch; }
      .btn-row button { flex: 1; justify-content: center; }
    }
  </style>
</head>
<body>
  <div class="app-shell">

    <!-- Left: Controls -->
    <div class="panel">
      <div class="panel-header">
        <h1>Joist Layout Calculator</h1>
        <span class="badge">Formula Mode</span>
      </div>
      <div class="subtext">
        center(m,k) = (segmentLength × k + edgeOffset) + m × (boardLength + gap)
      </div>

      <div class="grid-2">
        <div class="form-group">
          <label for="lengthSite">Site length <span>(mm)</span></label>
          <div class="input-wrapper">
            <span class="input-prefix">L</span>
            <input type="number" id="lengthSite" value="9005" min="100" step="1" inputmode="numeric" />
          </div>
        </div>

        <div class="form-group">
          <label for="lengthBoard">Board length <span>(mm)</span></label>
          <div class="input-wrapper">
            <span class="input-prefix">B</span>
            <input type="number" id="lengthBoard" value="3000" min="100" step="1" inputmode="numeric" />
          </div>
        </div>

        <div class="form-group">
          <label for="widthJoist">Joist width <span>(mm)</span></label>
          <div class="input-wrapper">
            <span class="input-prefix">W</span>
            <input type="number" id="widthJoist" value="45" min="10" step="1" inputmode="numeric" />
          </div>
        </div>

        <div class="form-group">
          <label for="maxSpacing">Max spacing <span>(mm)</span></label>
          <div class="input-wrapper">
            <span class="input-prefix">≤</span>
            <input type="number" id="maxSpacing" value="400" min="100" step="10" inputmode="numeric" />
          </div>
        </div>

        <div class="form-group">
          <label for="edgeOffset">Edge offset <span>(mm)</span></label>
          <div class="input-wrapper">
            <span class="input-prefix">↔</span>
            <input type="number" id="edgeOffset" value="5" min="0" step="1" inputmode="numeric" />
          </div>
        </div>

        <div class="form-group">
          <label for="boardGap">Board gap <span>(mm)</span></label>
          <div class="input-wrapper">
            <span class="input-prefix">␣</span>
            <input type="number" id="boardGap" value="5" min="0" step="1" inputmode="numeric" />
          </div>
        </div>
      </div>

      <div class="btn-row">
        <button class="btn-secondary" onclick="copyCSV()" id="btnCopy" disabled>
          <span>📋 Copy CSV</span>
        </button>
        <button class="btn-primary" onclick="calculate()">
          <span>▶ Calculate</span>
        </button>
      </div>

      <div id="pillStats" class="pill-stats"></div>
      <div id="errorBox" class="error" style="display:none;"></div>
    </div>

    <!-- Right: Results -->
    <div class="panel panel-results">
      <div class="panel-header">
        <div class="panel-header-title">Layout Table</div>
      </div>
      <div class="table-wrap">
        <div class="table-header">
          <div class="table-header-title">Joist Positions</div>
          <div class="table-header-meta" id="tableMeta">Press "Calculate" to generate</div>
        </div>
        <div id="tableContainer" class="table-scroll">
          <div class="empty-state">請喺左側輸入參數，撳「Calculate」生成龍骨佈局。</div>
        </div>
        <div class="summary-footer">
          <div>
            <span class="key">★</span>
            <span class="value"> Board Joint</span><br>
            <span class="hint">joists near board ends highlighted</span>
          </div>
          <div id="footerInfo"></div>
        </div>
      </div>
    </div>

  </div>

  <script>
    const MAX_BOARDS = 200;

    let lastRows = [];

    function $(id) { return document.getElementById(id); }

    function calculate() {
      const lengthSite  = parseFloat($("lengthSite").value);
      const lengthBoard = parseFloat($("lengthBoard").value);
      const widthJoist  = parseFloat($("widthJoist").value);
      const maxSpacing  = parseFloat($("maxSpacing").value);
      const edgeOffset  = parseFloat($("edgeOffset").value);
      const boardGap    = parseFloat($("boardGap").value);

      const errorBox    = $("errorBox");
      const pillStats   = $("pillStats");
      const tableMeta   = $("tableMeta");
      const tableContainer = $("tableContainer");
      const footerInfo  = $("footerInfo");
      const btnCopy     = $("btnCopy");

      errorBox.style.display = "none";
      errorBox.textContent = "";
      pillStats.innerHTML = "";
      footerInfo.textContent = "";
      btnCopy.disabled = true;
      lastRows = [];

      const inputs = [lengthSite, lengthBoard, widthJoist, maxSpacing, edgeOffset, boardGap];
      if (inputs.some(v => isNaN(v) || v < 0)) {
        showError("請輸入所有欄位嘅有效數值（≥ 0）。");
        tableContainer.innerHTML = "<div class='empty-state'>輸入不完整。</div>";
        tableMeta.textContent = "Invalid input";
        return;
      }

      if (lengthSite <= 0 || lengthBoard <= 0 || widthJoist <= 0 || maxSpacing <= 0) {
        showError("L / B / W / Max spacing 必須大於 0。");
        tableContainer.innerHTML = "<div class='empty-state'>參數必須為正數。</div>";
        tableMeta.textContent = "Invalid input";
        return;
      }

      if (widthJoist >= lengthBoard) {
        showError("Joist width 不能大於或等於 floorboard length。");
        tableContainer.innerHTML = "<div class='empty-state'>龍骨闊度異常。</div>";
        tableMeta.textContent = "Invalid config";
        return;
      }

      const nSeg = Math.ceil(lengthBoard / maxSpacing);
      const segmentLength = lengthBoard / nSeg;
      const rows = [];

      let m = 0;
      while (m < MAX_BOARDS) {
        const blockOffset = m * (lengthBoard + boardGap);
        if (blockOffset > lengthSite + 1e-9) break;

        for (let k = 0; k < nSeg; k++) {
          const center = (segmentLength * k + edgeOffset) + blockOffset;
          const left   = center - widthJoist / 2;
          const right  = center + widthJoist / 2;

          if (left > lengthSite + 1e-9) break;

          const boardEnd = (m + 1) * lengthBoard + m * boardGap + boardGap;
          const isJoint = Math.abs(center - boardEnd) < segmentLength * 0.55;

          rows.push({
            boardIndex: m,
            segIndex: k,
            number: rows.length + 1,
            left: left.toFixed(2),
            center: center.toFixed(2),
            right: right.toFixed(2),
            isJoint,
          });
        }
        m++;
      }

      if (m >= MAX_BOARDS) {
        showError("超過最大 board 數量上限（" + MAX_BOARDS + "），請檢查參數。");
      }

      if (!rows.length) {
        tableContainer.innerHTML = "<div class='empty-state'>場地長度不足以放置任何龍骨。</div>";
        tableMeta.textContent = "No joists";
        return;
      }

      lastRows = rows;
      renderTable(rows);
      tableMeta.textContent = rows.length + " joists · " + m + " boards";

      const spacingOk = segmentLength <= maxSpacing + 1e-9;
      const jointCount = rows.filter(r => r.isJoint).length;

      pillStats.innerHTML =
        '<div class="pill ' + (spacingOk ? "ok" : "warn") + '">' +
          '<span>Segment</span> <strong>' + segmentLength.toFixed(1) + ' mm</strong> (n=' + nSeg + ')' +
        '</div>' +
        '<div class="pill">' +
          '<span>Max</span> <strong>' + maxSpacing.toFixed(0) + ' mm</strong>' +
        '</div>' +
        '<div class="pill">' +
          '<span>Joists</span> <strong>' + rows.length + '</strong>' +
        '</div>' +
        '<div class="pill">' +
          '<span>Boards</span> <strong>' + m + '</strong>' +
        '</div>' +
        '<div class="pill">' +
          '<span>Joints ★</span> <strong>' + jointCount + '</strong>' +
        '</div>';

      footerInfo.innerHTML =
        '<span class="key">Segment</span> ' +
        '<span class="value">' + segmentLength.toFixed(2) + ' mm</span>';

      btnCopy.disabled = false;
    }

    function renderTable(rows) {
      const tbody = rows.map(function(r) {
        return '<tr class="' + (r.isJoint ? "highlight" : "") + '">' +
          '<td>' + r.number + '</td>' +
          '<td>' + r.boardIndex + '</td>' +
          '<td>' + r.segIndex + '</td>' +
          '<td>' + r.left + '</td>' +
          '<td>' + r.center + '</td>' +
          '<td>' + r.right + '</td>' +
        '</tr>';
      }).join("");

      $("tableContainer").innerHTML =
        '<table>' +
          '<thead><tr>' +
            '<th>Joist #</th>' +
            '<th>Board #</th>' +
            '<th>Seg #</th>' +
            '<th>Left (mm)</th>' +
            '<th>Center (mm)</th>' +
            '<th>Right (mm)</th>' +
          '</tr></thead>' +
          '<tbody>' + tbody + '</tbody>' +
        '</table>';
    }

    function showError(msg) {
      const box = $("errorBox");
      box.style.display = "block";
      box.textContent = msg;
    }

    function copyCSV() {
      if (!lastRows.length) return;
      const header = "Joist #,Board #,Seg #,Left (mm),Center (mm),Right (mm),Joint";
      const lines = lastRows.map(function(r) {
        return [r.number, r.boardIndex, r.segIndex, r.left, r.center, r.right, r.isJoint ? "★" : ""].join(",");
      });
      const csv = header + "\n" + lines.join("\n");

      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(csv).then(function() {
          const btn = $("btnCopy");
          const orig = btn.innerHTML;
          btn.innerHTML = "<span>✅ Copied!</span>";
          setTimeout(function() { btn.innerHTML = orig; }, 1500);
        }).catch(function() {
          fallbackCopy(csv);
        });
      } else {
        fallbackCopy(csv);
      }
    }

    function fallbackCopy(text) {
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.style.position = "fixed";
      ta.style.left = "-9999px";
      ta.style.top = "-9999px";
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      try {
        document.execCommand("copy");
        const btn = $("btnCopy");
        btn.innerHTML = "<span>✅ Copied!</span>";
        setTimeout(function() { btn.innerHTML = "<span>📋 Copy CSV</span>"; }, 1500);
      } catch (e) {
        alert("Copy failed. Please select and copy manually.");
      }
      document.body.removeChild(ta);
    }

    window.addEventListener("DOMContentLoaded", calculate);
  </script>
</body>
</html>
