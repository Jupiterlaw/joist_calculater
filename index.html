<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>龍骨佈局計算器</title>
  <style>
    :root {
      --bg:            #f4f1ec;
      --surface:       #ffffff;
      --surface-muted: #faf8f5;
      --border:        #e2ddd4;
      --border-strong: #cfc7ba;
      --text:          #2c2926;
      --text-muted:    #6b6560;
      --accent:        #2d5a4a;
      --accent-hover:  #234839;
      --accent-soft:   #e8f0ec;
      --danger:        #9b3b32;
      --danger-soft:   #fbeae8;
      --highlight:     #c4a574;
      --shadow-sm:     0 2px 8px rgba(44, 41, 38, 0.06);
      --shadow-md:     0 4px 24px rgba(44, 41, 38, 0.08);
      --radius:        14px;
      --radius-sm:     10px;
      --font:          "Segoe UI", "PingFang TC", "Microsoft JhengHei", "Noto Sans TC", sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:            #1a1917;
        --surface:       #242322;
        --surface-muted: #2a2928;
        --border:        #3a3632;
        --border-strong: #4a4540;
        --text:          #e8e4df;
        --text-muted:    #9b9590;
        --accent:        #4a8c73;
        --accent-hover:  #3d7962;
        --accent-soft:   rgba(74, 140, 115, 0.2);
        --danger:        #c45b52;
        --danger-soft:   rgba(196, 91, 82, 0.25);
        --highlight:     #d4b88a;
        --shadow-sm:     0 2px 8px rgba(0, 0, 0, 0.25);
        --shadow-md:     0 4px 24px rgba(0, 0, 0, 0.35);
      }
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      padding: clamp(1rem, 3vw, 1.5rem);
      background: var(--bg);
      font-family: var(--font);
      color: var(--text);
      font-size: 16px;
      line-height: 1.5;
      -webkit-text-size-adjust: 100%;
    }

    .app {
      max-width: 1080px;
      margin: 0 auto;
      padding: 0 1.25rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      padding: 1.35rem 1.5rem;
      margin-bottom: 1.25rem;
    }

    .card-title {
      font-size: clamp(1.1rem, 3vw, 1.35rem);
      font-weight: 700;
      margin: 0 0 0.75rem;
      padding: 0 0 0.5rem;
      border-bottom: 2px solid var(--accent);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 0.75rem;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .field label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
    }

    .field label span {
      color: var(--text);
      font-weight: 400;
    }

    .input {
      width: 100%;
      padding: 0.65rem 0.75rem;
      font-size: 0.95rem;
      font-family: var(--font);
      color: var(--text);
      background: var(--surface);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-sm);
      transition: border-color 0.2s, box-shadow 0.2s;
      min-height: 48px;
    }

    .input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .input:hover { border-color: var(--accent); }

    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 1rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      padding: 0.6rem 1.2rem;
      font-size: 0.95rem;
      font-family: var(--font);
      font-weight: 600;
      border: 1px solid transparent;
      border-radius: var(--radius-sm);
      cursor: pointer;
      min-height: 48px;
      transition: background 0.2s, box-shadow 0.2s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      text-decoration: none;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:focus-visible { box-shadow: 0 0 0 3px var(--accent-soft); }

    .btn-ghost {
      background: transparent;
      color: var(--danger);
      border-color: var(--danger);
    }
    .btn-ghost:hover { background: var(--danger-soft); }

    .btn-row .btn {
      flex: 0 1 auto;
    }
    @media (max-width: 480px) {
      .btn-row .btn { flex: 1; justify-content: center; }
    }

    .pill-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: 0.75rem;
    }

    .pill {
      font-size: 0.78rem;
      padding: 0.35rem 0.65rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface-muted);
      color: var(--text-muted);
      white-space: nowrap;
    }

    .pill strong { color: var(--accent); font-weight: 700; }
    .pill.ok strong { color: var(--accent); }
    .pill.warn strong { color: var(--highlight); }

    .table-wrap {
      margin-top: 0.5rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
      max-height: clamp(360px, 60vh, 540px);
      display: flex;
      flex-direction: column;
    }

    .table-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 0.5rem 0.75rem 0.35rem;
      border-bottom: 1px solid var(--border);
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .table-scroll {
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      flex: 1;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
      min-width: 460px;
    }

    th, td {
      padding: 0.4rem 0.5rem;
      text-align: right;
      white-space: nowrap;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: var(--surface-muted);
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      font-size: 0.78rem;
      font-weight: 600;
    }

    th:first-child, td:first-child { text-align: left; }

    tbody tr:nth-child(even) { background: var(--surface-muted); }

    tr.highlight { background: var(--accent-soft) !important; }
    tr.highlight td { font-weight: 600; }
    tr.highlight td:first-child::before { content: "★ "; color: var(--accent); }

    .summary-footer {
      padding: 0.5rem 0.75rem 0.6rem;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.78rem;
      color: var(--text-muted);
      flex-wrap: wrap;
    }

    .summary-footer .key { color: var(--accent); font-weight: 600; }

    .empty-state {
      font-size: 0.9rem;
      color: var(--text-muted);
      padding: 1rem 1.25rem;
      text-align: center;
    }

    .error {
      color: var(--danger);
      font-size: 0.85rem;
      margin-top: 0.5rem;
      padding: 0.5rem 0.75rem;
      background: var(--danger-soft);
      border-radius: var(--radius-sm);
      border: 1px solid var(--danger);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 480px) {
      .app { padding: 0 0.75rem; }
      .card { padding: 1rem 1rem; }
    }
  </style>
  <link rel="stylesheet" href="print.css" media="print" />
</head>
<body>
  <div class="app">

    <!-- Input Section -->
    <div class="card">
      <div class="card-title">
        <span>龍骨佈局計算器</span>
        <span style="font-size:0.78rem;color:var(--text-muted);font-weight:400;border:1px solid var(--border);border-radius:999px;padding:0.2rem 0.6rem;">中心(m,k) = (segmentLength × k + edgeOffset) + m × (boardLength + gap)</span>
      </div>

      <div class="field-grid">
        <div class="field">
          <label for="lengthSite">場地長度 <span>（毫米）</span></label>
          <input type="number" class="input" id="lengthSite" value="9005" min="100" step="1" inputmode="numeric" />
        </div>
        <div class="field">
          <label for="lengthBoard">地板長度 <span>（毫米）</span></label>
          <input type="number" class="input" id="lengthBoard" value="3000" min="100" step="1" inputmode="numeric" />
        </div>
        <div class="field">
          <label for="widthJoist">龍骨闊度 <span>（毫米）</span></label>
          <input type="number" class="input" id="widthJoist" value="45" min="10" step="1" inputmode="numeric" />
        </div>
        <div class="field">
          <label for="maxSpacing">最大間距 <span>（毫米）</span></label>
          <input type="number" class="input" id="maxSpacing" value="400" min="100" step="10" inputmode="numeric" />
        </div>
        <div class="field">
          <label for="edgeOffset">邊緣偏移 <span>（毫米）</span></label>
          <input type="number" class="input" id="edgeOffset" value="5" min="0" step="1" inputmode="numeric" />
        </div>
        <div class="field">
          <label for="boardGap">板端接縫 <span>（毫米）</span></label>
          <input type="number" class="input" id="boardGap" value="5" min="0" step="1" inputmode="numeric" />
        </div>
      </div>

      <div class="btn-row">
        <button class="btn btn-ghost" onclick="copyCSV()" id="btnCopy" disabled>
          <span>📋 複製 CSV</span>
        </button>
        <button class="btn btn-primary" onclick="calculate()">
          <span>計算</span>
        </button>
      </div>

      <div id="pillStats" class="pill-stats"></div>
      <div id="errorBox" class="error" style="display:none;"></div>
    </div>

    <!-- Results Section -->
    <div class="card">
      <div class="card-title">
        <span>龍骨位置表</span>
        <span style="font-size:0.78rem;color:var(--text-muted);font-weight:400;" id="tableMeta">請輸入參數後按「計算」</span>
      </div>
      <div class="table-wrap">
        <div class="table-header">
          <span style="font-size:0.85rem;font-weight:600;color:var(--text-muted);">龍骨位置</span>
          <span style="font-size:0.78rem;color:var(--text-muted);">★ = 板端接縫</span>
        </div>
        <div id="tableContainer" class="table-scroll">
          <div class="empty-state">請輸入參數，按「計算」生成龍骨佈局。</div>
        </div>
        <div class="summary-footer">
          <div>
            <span class="key">★</span>
            <span> 板端接縫</span>
          </div>
          <div id="footerInfo"></div>
        </div>
      </div>
    </div>

    <div class="sr-only" aria-live="polite" id="announceResult"></div>

  </div>

  <script>
    const MAX_BOARDS = 200;

    let lastRows = [];

    function $(id) { return document.getElementById(id); }

    function calculate() {
      const lengthSite  = parseFloat($("lengthSite").value);
      const lengthBoard = parseFloat($("lengthBoard").value);
      const widthJoist  = parseFloat($("widthJoist").value);
      const maxSpacing  = parseFloat($("maxSpacing").value);
      const edgeOffset  = parseFloat($("edgeOffset").value);
      const boardGap    = parseFloat($("boardGap").value);

      const errorBox    = $("errorBox");
      const pillStats   = $("pillStats");
      const tableMeta   = $("tableMeta");
      const tableContainer = $("tableContainer");
      const footerInfo  = $("footerInfo");
      const btnCopy     = $("btnCopy");

      errorBox.style.display = "none";
      errorBox.textContent = "";
      pillStats.innerHTML = "";
      footerInfo.textContent = "";
      btnCopy.disabled = true;
      lastRows = [];

      const inputs = [lengthSite, lengthBoard, widthJoist, maxSpacing, edgeOffset, boardGap];
      if (inputs.some(v => isNaN(v) || v < 0)) {
        showError("請輸入所有欄位嘅有效數值（≥ 0）。");
        tableContainer.innerHTML = "<div class='empty-state'>輸入不完整。</div>";
        tableMeta.textContent = "輸入無效";
        return;
      }

      if (lengthSite <= 0 || lengthBoard <= 0 || widthJoist <= 0 || maxSpacing <= 0) {
        showError("場地長度 / 地板長度 / 龍骨闊度 / 最大間距 必須大於 0。");
        tableContainer.innerHTML = "<div class='empty-state'>參數必須為正數。</div>";
        tableMeta.textContent = "參數無效";
        return;
      }

      if (widthJoist >= lengthBoard) {
        showError("龍骨闊度不能大於或等於地板長度。");
        tableContainer.innerHTML = "<div class='empty-state'>龍骨闊度異常。</div>";
        tableMeta.textContent = "設定無效";
        return;
      }

      const nSeg = Math.ceil(lengthBoard / maxSpacing);
      const segmentLength = lengthBoard / nSeg;
      const rows = [];

      let m = 0;
      while (m < MAX_BOARDS) {
        const blockOffset = m * (lengthBoard + boardGap);
        if (blockOffset > lengthSite + 1e-9) break;

        for (let k = 0; k < nSeg; k++) {
          const center = (segmentLength * k + edgeOffset) + blockOffset;
          const left   = center - widthJoist / 2;
          const right  = center + widthJoist / 2;

          if (left > lengthSite + 1e-9) break;

          const boardEnd = (m + 1) * lengthBoard + m * boardGap + boardGap;
          const isJoint = Math.abs(center - boardEnd) < segmentLength * 0.55;

          rows.push({
            boardIndex: m,
            segIndex: k,
            number: rows.length + 1,
            left: left.toFixed(2),
            center: center.toFixed(2),
            right: right.toFixed(2),
            isJoint,
          });
        }
        m++;
      }

      if (m >= MAX_BOARDS) {
        showError("超過最大 board 數量上限（" + MAX_BOARDS + "），請檢查參數。");
      }

      if (!rows.length) {
        tableContainer.innerHTML = "<div class='empty-state'>場地長度不足以放置任何龍骨。</div>";
        tableMeta.textContent = "沒有龍骨";
        return;
      }

      lastRows = rows;
      renderTable(rows);
      tableMeta.textContent = rows.length + " 支龍骨 · " + m + " 塊地板";

      const spacingOk = segmentLength <= maxSpacing + 1e-9;
      const jointCount = rows.filter(r => r.isJoint).length;

      pillStats.innerHTML =
        '<div class="pill ' + (spacingOk ? "ok" : "warn") + '">' +
          '<span>分段</span> <strong>' + segmentLength.toFixed(1) + ' 毫米</strong> (n=' + nSeg + ')' +
        '</div>' +
        '<div class="pill">' +
          '<span>最大</span> <strong>' + maxSpacing.toFixed(0) + ' 毫米</strong>' +
        '</div>' +
        '<div class="pill">' +
          '<span>龍骨</span> <strong>' + rows.length + '</strong>' +
        '</div>' +
        '<div class="pill">' +
          '<span>地板</span> <strong>' + m + '</strong>' +
        '</div>' +
        '<div class="pill">' +
          '<span>接縫</span> <strong>' + jointCount + '</strong>' +
        '</div>';

      footerInfo.innerHTML =
        '<span class="key">分段長度</span> ' +
        '<span>' + segmentLength.toFixed(2) + ' 毫米</span>';

      btnCopy.disabled = false;
    }

    function renderTable(rows) {
      const tbody = rows.map(function(r) {
        return '<tr class="' + (r.isJoint ? "highlight" : "") + '">' +
          '<td>' + r.number + '</td>' +
          '<td>' + r.boardIndex + '</td>' +
          '<td>' + r.segIndex + '</td>' +
          '<td>' + r.left + '</td>' +
          '<td>' + r.center + '</td>' +
          '<td>' + r.right + '</td>' +
        '</tr>';
      }).join("");

      $("tableContainer").innerHTML =
        '<table>' +
          '<thead><tr>' +
            '<th>#</th>' +
            '<th>地板</th>' +
            '<th>分段</th>' +
            '<th>左（毫米）</th>' +
            '<th>中心（毫米）</th>' +
            '<th>右（毫米）</th>' +
          '</tr></thead>' +
          '<tbody>' + tbody + '</tbody>' +
        '</table>';
    }

    function showError(msg) {
      const box = $("errorBox");
      box.style.display = "block";
      box.textContent = msg;
    }

    function copyCSV() {
      if (!lastRows.length) return;
      const header = "Joist #,Board #,Seg #,Left (mm),Center (mm),Right (mm),Joint";
      const lines = lastRows.map(function(r) {
        return [r.number, r.boardIndex, r.segIndex, r.left, r.center, r.right, r.isJoint ? "★" : ""].join(",");
      });
      const csv = header + "\n" + lines.join("\n");

      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(csv).then(function() {
          const btn = $("btnCopy");
          const orig = btn.innerHTML;
          btn.innerHTML = "<span>✅ 已複製!</span>";
          setTimeout(function() { btn.innerHTML = orig; }, 1500);
        }).catch(function() {
          fallbackCopy(csv);
        });
      } else {
        fallbackCopy(csv);
      }
    }

    function fallbackCopy(text) {
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.style.position = "fixed";
      ta.style.left = "-9999px";
      ta.style.top = "-9999px";
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      try {
        document.execCommand("copy");
        const btn = $("btnCopy");
        btn.innerHTML = "<span>✅ 已複製!</span>";
        setTimeout(function() { btn.innerHTML = "<span>📋 複製 CSV</span>"; }, 1500);
      } catch (e) {
        alert("複製失敗，請手動複製。");
      }
      document.body.removeChild(ta);
    }

    // Live recompute on input change
    const inputs = document.querySelectorAll("#lengthSite, #lengthBoard, #widthJoist, #maxSpacing, #edgeOffset, #boardGap");
    for (var i = 0; i < inputs.length; i++) {
      inputs[i].addEventListener("input", calculate);
    }

    window.addEventListener("DOMContentLoaded", calculate);
  </script>
</body>
</html>
