<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>龍骨佈局計算器</title>
  <style>
    :root {
      --bg: #f4f1ec; --surface: #fff; --surface-2: #faf8f5;
      --border: #e2ddd4; --border-focus: #2d5a4a;
      --text: #2c2926; --text-muted: #6b6560; --text-faint: #9b9590;
      --accent: #2d5a4a; --accent-hover: #234839; --accent-soft: rgba(45,90,74,.12);
      --danger: #9b3b32; --danger-soft: rgba(155,59,50,.1);
      --shadow-sm: 0 2px 8px rgba(0,0,0,.06); --shadow-md: 0 4px 20px rgba(0,0,0,.08);
      --radius: 12px; --radius-sm: 8px;
      --font: system-ui,-apple-system,"Segoe UI","PingFang TC","Microsoft JhengHei","Noto Sans TC",sans-serif;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1917; --surface: #242322; --surface-2: #2a2928;
        --border: #3a3632; --border-focus: #4a8c73;
        --text: #e8e4df; --text-muted: #9b9590; --text-faint: #6b6965;
        --accent: #4a8c73; --accent-hover: #3d7962; --accent-soft: rgba(74,140,115,.15);
        --danger: #c45b52; --danger-soft: rgba(196,91,82,.15);
        --shadow-sm: 0 2px 8px rgba(0,0,0,.3); --shadow-md: 0 4px 20px rgba(0,0,0,.4);
      }
    }
    *,*::before,*::after{box-sizing:border-box}
    body{margin:0;min-height:100vh;font-family:var(--font);font-size:16px;line-height:1.55;color:var(--text);background:var(--bg)}

    .app{max-width:480px;margin:0 auto;padding:1.25rem 1rem 2rem}

    .header{text-align:center;margin-bottom:1.5rem}
    .header h1{margin:0 0 .25rem;font-size:1.5rem;font-weight:700}
    .header p{margin:0;font-size:.95rem;color:var(--text-muted)}

    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem}
    .card-title{margin:0 0 1rem;font-size:1rem;font-weight:650;display:flex;align-items:center;gap:.5rem}
    .card-title::before{content:"";width:3px;height:1em;background:var(--accent);border-radius:2px}

    .field-grid{display:grid;grid-template-columns:1fr 1fr;gap:.875rem}
    @media(max-width:480px){.field-grid{grid-template-columns:1fr}}

    .field{display:flex;flex-direction:column;gap:.3rem}
    .field label{font-size:.875rem;font-weight:600}

    input[type="number"]{
      width:100%;padding:.6rem .75rem;font:inherit;font-size:1rem;
      color:var(--text);background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-sm);
      transition:border-color .15s,box-shadow .15s;
    }
    input:focus{outline:none;border-color:var(--border-focus);box-shadow:0 0 0 3px var(--accent-soft)}

    .btn-row{display:flex;gap:.5rem;margin-top:.75rem;flex-wrap:wrap}
    .btn{
      display:inline-flex;align-items:center;justify-content:center;gap:.3rem;
      padding:.55rem 1rem;font:inherit;font-size:.95rem;font-weight:600;
      border:none;border-radius:var(--radius-sm);cursor:pointer;
      transition:background .15s,transform .08s;
    }
    .btn:active{transform:scale(.97)}
    .btn-primary{background:var(--accent);color:#fff}
    .btn-primary:hover{background:var(--accent-hover)}
    .btn-secondary{background:var(--surface-2);border:1px solid var(--border);color:var(--text)}

    .pill-stats{display:flex;flex-wrap:wrap;gap:.35rem;margin-top:.65rem}
    .pill{font-size:.75rem;border-radius:999px;padding:.3rem .6rem;border:1px solid var(--border);background:var(--surface-2);color:var(--text-muted);white-space:nowrap}
    .pill strong{color:var(--accent);font-weight:600}
    .pill.ok strong{color:var(--accent)}
    .pill.warn strong{color:var(--danger)}

    .error{color:var(--danger);font-size:.85rem;margin-top:.5rem;padding:.5rem .75rem;background:var(--danger-soft);border-radius:var(--radius-sm);border:1px solid rgba(155,59,50,.2)}

    .table-wrap{border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;margin-top:.5rem}
    .table-header{display:flex;justify-content:space-between;align-items:baseline;padding:.5rem .75rem;border-bottom:1px solid var(--border);gap:.5rem;flex-wrap:wrap}
    .table-header-title{font-size:.85rem;font-weight:650;color:var(--text-muted)}
    .table-header-meta{font-size:.75rem;color:var(--text-faint)}
    .table-scroll{overflow:auto;-webkit-overflow-scrolling:touch;max-height:clamp(300px,50vh,480px)}

    table{width:100%;border-collapse:collapse;font-size:.875rem;min-width:420px}
    th,td{padding:.45rem .6rem;text-align:right;white-space:nowrap}
    th{position:sticky;top:0;z-index:1;background:var(--surface);color:var(--text-muted);border-bottom:1px solid var(--border);font-size:.75rem;font-weight:600}
    th:first-child,td:first-child{text-align:left}
    tbody tr:nth-child(even){background:var(--surface-2)}
    tr.highlight{background:var(--accent-soft) !important}
    tr.highlight td{font-weight:500}
    tr.highlight td:first-child::before{content:"★ ";color:var(--accent)}

    .summary-footer{padding:.5rem .75rem;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:.5rem;font-size:.75rem;color:var(--text-muted);flex-wrap:wrap}
    .summary-footer .key{color:var(--accent)}
    .summary-footer .value{color:var(--text);font-weight:600}

    .empty-state{font-size:.9rem;color:var(--text-muted);padding:1.5rem;text-align:center}

    @media print{
      body{background:#fff}.btn{display:none}
      .card,.table-wrap{box-shadow:none;border:1px solid #ccc}
      input{border:none;padding:0;background:transparent}
      th{background:#f0f0f0}
      tr.highlight{background:#eee !important}
      .empty-state{display:none}
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>龍骨佈局計算器</h1>
      <p>輸入場地與地板參數，自動計算每條龍骨位置，標示板端接縫。</p>
    </header>

    <section class="card" aria-labelledby="input-title">
      <h2 class="card-title" id="input-title">輸入參數</h2>
      <div class="field-grid">
        <div class="field">
          <label for="lengthSite">場地長度（毫米）</label>
          <input type="number" id="lengthSite" value="9005" min="100" step="1" inputmode="numeric">
        </div>
        <div class="field">
          <label for="lengthBoard">地板長度（毫米）</label>
          <input type="number" id="lengthBoard" value="3000" min="100" step="1" inputmode="numeric">
        </div>
        <div class="field">
          <label for="widthJoist">龍骨闊度（毫米）</label>
          <input type="number" id="widthJoist" value="45" min="10" step="1" inputmode="numeric">
        </div>
        <div class="field">
          <label for="maxSpacing">最大間距（毫米）</label>
          <input type="number" id="maxSpacing" value="400" min="100" step="10" inputmode="numeric">
        </div>
        <div class="field">
          <label for="edgeOffset">邊緣偏移（毫米）</label>
          <input type="number" id="edgeOffset" value="5" min="0" step="1" inputmode="numeric">
        </div>
        <div class="field">
          <label for="boardGap">板間隙（毫米）</label>
          <input type="number" id="boardGap" value="5" min="0" step="1" inputmode="numeric">
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-secondary" onclick="copyCSV()" id="btnCopy" disabled>📋 匯出 CSV</button>
        <button class="btn btn-primary" onclick="calculate()">▶ 計算</button>
      </div>
      <div id="pillStats" class="pill-stats"></div>
      <div id="errorBox" class="error" style="display:none;"></div>
    </section>

    <section class="card" aria-labelledby="result-title">
      <h2 class="card-title" id="result-title">龍骨佈局</h2>
      <div class="table-wrap">
        <div class="table-header">
          <div class="table-header-title">龍骨位置表</div>
          <div class="table-header-meta" id="tableMeta">請輸入參數後撳「計算」</div>
        </div>
        <div id="tableContainer" class="table-scroll">
          <div class="empty-state">請在上方輸入參數，撳「計算」生成龍骨佈局。</div>
        </div>
        <div class="summary-footer">
          <div><span class="key">★</span> <span class="value">板端接縫</span><br><span style="opacity:.7">靠近板端的龍骨已標示</span></div>
          <div id="footerInfo"></div>
        </div>
      </div>
    </section>
  </div>

  <script>
    const MAX_BOARDS = 200;
    let lastRows = [];
    function $(id) { return document.getElementById(id); }
    function calculate() {
      const L = parseFloat($("lengthSite").value);
      const B = parseFloat($("lengthBoard").value);
      const W = parseFloat($("widthJoist").value);
      const S = parseFloat($("maxSpacing").value);
      const E = parseFloat($("edgeOffset").value);
      const G = parseFloat($("boardGap").value);
      const err = $("errorBox"), ps = $("pillStats"), tm = $("tableMeta"), tc = $("tableContainer"), fi = $("footerInfo"), bc = $("btnCopy");
      err.style.display = "none"; err.textContent = ""; ps.innerHTML = ""; fi.textContent = ""; bc.disabled = true; lastRows = [];
      if ([L,B,W,S,E,G].some(v => isNaN(v) || v < 0)) { err.style.display="block"; err.textContent="請輸入所有欄位嘅有效數值（≥ 0）。"; tc.innerHTML="<div class='empty-state'>輸入不完整。</div>"; tm.textContent="Invalid input"; return; }
      if (L <= 0 || B <= 0 || W <= 0 || S <= 0) { err.style.display="block"; err.textContent="L / B / W / Max spacing 必須大於 0。"; tc.innerHTML="<div class='empty-state'>參數必須為正數。</div>"; tm.textContent="Invalid input"; return; }
      if (W >= B) { err.style.display="block"; err.textContent="龍骨闊度不能大於或等於地板長度。"; tc.innerHTML="<div class='empty-state'>龍骨闊度異常。</div>"; tm.textContent="Invalid config"; return; }
      const nSeg = Math.ceil(B / S), segLen = B / nSeg;
      const rows = [];
      let m = 0;
      while (m < MAX_BOARDS) {
        const bo = m * (B + G); if (bo > L + 1e-9) break;
        for (let k = 0; k < nSeg; k++) {
          const center = segLen * k + E + bo, left = center - W / 2, right = center + W / 2;
          if (left > L + 1e-9) break;
          const be = (m + 1) * B + m * G + G;
          rows.push({ boardIndex: m, segIndex: k, number: rows.length + 1, left: left.toFixed(2), center: center.toFixed(2), right: right.toFixed(2), isJoint: Math.abs(center - be) < segLen * 0.55 });
        }
        m++;
      }
      if (m >= MAX_BOARDS) { err.style.display="block"; err.textContent="超過最大板數上限（"+MAX_BOARDS+"），請檢查參數。"; }
      if (!rows.length) { tc.innerHTML="<div class='empty-state'>場地長度不足以放置任何龍骨。</div>"; tm.textContent="No joists"; return; }
      lastRows = rows; renderTable(rows); tm.textContent = rows.length + " 條龍骨 · " + m + " 塊板";
      const ok = segLen <= S + 1e-9, jc = rows.filter(r=>r.isJoint).length;
      ps.innerHTML = '<div class="pill '+(ok?"ok":"warn")+'"><strong>'+segLen.toFixed(1)+' mm</strong> ('+nSeg+' 段)</div>'+'<div class="pill"><strong>'+S.toFixed(0)+' mm</strong></div>'+'<div class="pill"><strong>'+rows.length+'</strong> 條</div>'+'<div class="pill"><strong>'+m+'</strong> 塊</div>'+'<div class="pill"><strong>★ '+jc+'</strong></div>';
      fi.innerHTML = '<span class="key">段長</span> <span class="value">'+segLen.toFixed(2)+' mm</span>';
      bc.disabled = false;
    }
    function renderTable(rows) {
      const th = rows.map(r=>'<tr class="'+(r.isJoint?"highlight":"")+'"><td>'+r.number+'</td><td>'+r.boardIndex+'</td><td>'+r.segIndex+'</td><td>'+r.left+'</td><td>'+r.center+'</td><td>'+r.right+'</td></tr>').join("");
      $("tableContainer").innerHTML = '<table><thead><tr><th>龍骨 #</th><th>板 #</th><th>段 #</th><th>左 （毫米）</th><th>中心 （毫米）</th><th>右 （毫米）</th></tr></thead><tbody>'+th+'</tbody></table>';
    }
    function copyCSV() {
      if (!lastRows.length) return;
      const csv = "Joist #,Board #,Seg #,Left (mm),Center (mm),Right (mm),Joint\n" + lastRows.map(r=>[r.number,r.boardIndex,r.segIndex,r.left,r.center,r.right,r.isJoint?"★":""].join(",")).join("\n");
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(csv).then(()=>{ const o=$("btnCopy").innerHTML; $("btnCopy").innerHTML="✅ 已複製！"; setTimeout(()=>{$("btnCopy").innerHTML=o;},1500); }).catch(()=>fc(csv));
      } else fc(csv);
    }
    function fc(t) {
      const ta=document.createElement("textarea"); ta.value=t; ta.style.cssText="position:fixed;left:-9999px;top:-9999px";
      document.body.appendChild(ta); ta.focus(); ta.select();
      try { document.execCommand("copy"); $("btnCopy").innerHTML="✅ 已複製！"; setTimeout(()=>{$("btnCopy").innerHTML="📋 匯出 CSV";},1500); } catch(e) { alert("複製失敗，請手動選取複製。"); }
      document.body.removeChild(ta);
    }
    window.addEventListener("DOMContentLoaded", calculate);
  </script>
</body>
</html>
